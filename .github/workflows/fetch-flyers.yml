name: Fetch Flyers
on:
  schedule:
    - cron: "0 10 * * 3"   # Every Wednesday at 10:00 UTC (new flyers mid-week)
  workflow_dispatch:        # Manual trigger
    inputs:
      zipcode:
        description: "Zipcode for store lookup"
        required: false
        default: "98034"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch flyers
        env:
          FLYER_ZIPCODE: ${{ github.event.inputs.zipcode || '98034' }}
        run: python -m scripts.flyers.main --zipcode "$FLYER_ZIPCODE"

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/flyers/
          if git diff --cached --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: fetch flyers $(date -u +%Y-%m-%d)"
            git push
          fi
